<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunday Staples Inner Circle Staff</title>
    <link rel="stylesheet" href="staff.css?v=1" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p>Sunday Staples Research Ops</p>
          <h1>Head to Head Command</h1>
        </div>
        <a href="index.html?scene=campus">Back to VIP Campus</a>
      </header>

      <section class="summary-grid" aria-label="Dashboard summary">
        <article>
          <span>Concepts</span>
          <strong id="concept-count">0</strong>
        </article>
        <article>
          <span>Head to Head Pairs</span>
          <strong id="pair-count">0</strong>
        </article>
        <article>
          <span>Captured Answers</span>
          <strong id="answer-count">0</strong>
        </article>
      </section>

      <section class="workspace">
        <aside class="panel">
          <div class="panel-head">
            <p>File Depository</p>
            <h2>Shoe Concepts</h2>
          </div>
          <div id="concept-list" class="concept-list"></div>
        </aside>

        <section class="panel">
          <div class="panel-head">
            <p>Mission Logic</p>
            <h2>Footwear Duel Matchups</h2>
          </div>
          <div id="pair-list" class="pair-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <p>Signals</p>
            <h2>Latest Local Results</h2>
          </div>
          <div id="results-list" class="results-list"></div>
        </section>
      </section>
    </main>
    <script src="staff.js?v=1"></script>
  </body>
</html>
